<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{title}}</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: "Times New Roman", Times, serif;
      font-size: 14px;
      line-height: 1.5;
      color: #000000;
      background-color: #E2E7EC; /* MS Word workspace canvas background */
      margin: 0;
      padding: 40px 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    .word-page {
      background-color: #FFFFFF;
      width: 210mm;
      min-height: 297mm;
      padding: 20mm 20mm 20mm 30mm; /* Top Right Bottom Left margins */
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
      position: relative;
    }

    .word-page.landscape {
      width: 297mm;
      min-height: 210mm;
      padding: 20mm;
    }

    h1, h2, h3, h4 {
      margin-top: 18pt;
      margin-bottom: 6pt;
      line-height: 1.3;
      page-break-after: avoid;
    }

    h1 {
      font-size: 20pt;
      color: #1b365d; /* Deep Navy Blue */
      text-align: left;
      margin-bottom: 24pt;
    }

    h2 {
      font-size: 16pt;
      color: #1b365d; /* Deep Navy Blue */
      border-bottom: 2px solid #cbd5e1; /* Elegant light-blue border separator */
      padding-bottom: 4px;
      margin-top: 24pt;
      margin-bottom: 8pt;
    }

    h3 {
      font-size: 14pt;
      color: #2b6cb0; /* Vibrant Steel Blue */
      font-weight: bold;
      margin-top: 18pt;
      margin-bottom: 6pt;
    }

    p {
      margin-top: 0;
      margin-bottom: 0;
      text-indent: 1.27cm; /* Regulatory 0.5 in indentation */
      text-align: justify; /* Justified paragraphs */
      padding-bottom: 8pt;
    }

    ul, ol {
      margin-top: 0;
      margin-bottom: 12pt;
      padding-left: 0.8cm;
    }

    li {
      margin-bottom: 4pt;
      text-align: justify;
    }

    li p {
      text-indent: 0;
      margin-bottom: 0;
      padding-bottom: 4pt;
    }

    .table-container {
      width: 100%;
      margin: 12pt 0;
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px; /* Slightly smaller table typography */
      margin: 12pt auto;
    }

    th, td {
      border: 1px solid #000000; /* Distinct black grid border */
      padding: 6px 8px;
      vertical-align: top;
    }

    th {
      background-color: #F2F2F2; /* Standard table header color */
      color: #1b365d;
      font-weight: bold;
      text-align: center;
    }

    .caption {
      font-size: 12px;
      font-style: italic;
      text-align: center;
      margin-top: 6pt;
      margin-bottom: 12pt;
      color: #333333;
    }

    .media-container {
      width: 100%;
      margin: 18pt 0;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .media-container img,
    .media-container .chart-mockup {
      max-width: 100%;
      height: auto;
      border: 1px solid #D0D0D0;
      background-color: #FFFFFF;
    }

    pre, code {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
    }

    pre {
      background-color: #f8f9fa;
      border: 1px solid #e9ecef;
      padding: 10px;
      border-radius: 4px;
      overflow-x: auto;
      margin-left: 1.27cm; /* Indent code blocks like paragraphs */
    }

    code {
      background-color: #f8f9fa;
      padding: 2px 4px;
      border-radius: 3px;
      font-size: 0.95em;
    }

    @page {
      size: A4 portrait;
      margin: 20mm 20mm 20mm 30mm;
    }

    @page landscape-page {
      size: A4 landscape;
      margin: 20mm;
    }

    @page cover-page-layout {
      size: A4 portrait;
      margin: 0;
    }

    @media screen and (max-width: 210mm) {
      body {
        padding: 10px;
        background-color: #FFFFFF;
      }
      .word-page {
        width: 100%;
        padding: 15px;
        box-shadow: none;
      }
      p {
        text-indent: 20px;
      }
    }

    @media screen and (max-width: 297mm) {
      body.has-landscape {
        padding: 10px;
        background-color: #FFFFFF;
      }
      .word-page.landscape {
        width: 100%;
        padding: 15px;
        box-shadow: none;
      }
    }

    /* Cover Page Styles */
    .cover-page {
      position: relative;
      overflow: hidden;
      background-color: #FFFFFF;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      min-height: 297mm;
      padding: 30mm 25mm 30mm 30mm;
      page-break-after: always;
    }
    .cover-bg-shape-1 {
      position: absolute;
      top: -150px;
      right: -150px;
      width: 500px;
      height: 500px;
      border-radius: 50%;
      background-color: rgba(15, 82, 186, 0.04);
      z-index: 1;
      pointer-events: none;
    }
    .cover-bg-shape-2 {
      position: absolute;
      top: -220px;
      right: -80px;
      width: 450px;
      height: 450px;
      border-radius: 50%;
      background-color: rgba(15, 82, 186, 0.07);
      z-index: 2;
      pointer-events: none;
    }
    .cover-title-area {
      margin-top: auto;
      text-align: center;
      width: 100%;
      z-index: 5;
    }
    .cover-subtitle {
      font-family: "Georgia", "Times New Roman", Times, serif;
      font-style: italic;
      font-size: 24pt;
      color: #666666;
      margin-bottom: 12pt;
    }
    .cover-main-title {
      font-family: "Georgia", "Times New Roman", Times, serif;
      font-size: 32pt;
      font-weight: bold;
      color: #0f52ba;
      letter-spacing: 1px;
      margin: 0;
      text-align: center;
      line-height: 1.2;
    }
    .cover-metadata-area {
      align-self: flex-end;
      text-align: right;
      margin-top: 20mm;
      margin-bottom: auto;
      font-family: "Times New Roman", Times, serif;
      font-size: 11pt;
      line-height: 1.6;
      color: #555555;
      z-index: 5;
      margin-right: 10mm;
    }
    .cover-meta-item {
      margin-bottom: 4px;
    }
    .cover-meta-date {
      color: #0f52ba;
      font-weight: bold;
      margin-top: 8pt;
      font-size: 11pt;
    }

    /* Table of Contents Styles */
    .toc-page {
      min-height: 297mm;
      padding: 30mm 20mm 20mm 30mm;
      page-break-after: always;
    }
    .toc-title {
      text-align: left !important;
      text-transform: uppercase;
      font-size: 20pt;
      color: #1b365d;
      margin-top: 10mm;
      margin-bottom: 5mm;
    }
    .toc-divider {
      width: 80px;
      height: 3px;
      background-color: #2b6cb0;
      margin: 0 0 15mm 0;
    }
    .toc-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    .toc-list li {
      display: flex;
      align-items: flex-end;
      margin-bottom: 12pt;
      font-size: 11pt;
    }
    .toc-name {
      font-weight: bold;
      color: #2d3748;
    }
    .toc-dots {
      flex-grow: 1;
      border-bottom: 2px dotted #cbd5e1;
      margin: 0 8px 3px 8px;
    }
    .toc-page-num {
      font-weight: bold;
      color: #1b365d;
    }
    .toc-list li.toc-sub-item {
      padding-left: 20px;
      margin-bottom: 8pt;
      font-size: 10pt;
    }
    .toc-list li.toc-sub-item .toc-name {
      font-weight: normal;
      color: #4a5568;
    }
    .toc-list li.toc-sub-item .toc-page-num {
      font-weight: normal;
      color: #4a5568;
    }
    .mermaid {
      display: flex;
      justify-content: center;
      margin: 18pt 0;
      width: 100%;
    }

    @media print {
      body {
        background-color: #FFFFFF;
        padding: 0;
        margin: 0;
      }
      .word-page {
        width: 100%;
        min-height: initial !important;
        box-shadow: none;
        padding: 0 !important;
        page-break-after: always;
      }
      .word-page:last-child {
        page-break-after: avoid;
      }
      .word-page.landscape {
        page: landscape-page;
        width: 100%;
        min-height: initial !important;
        padding: 0 !important;
      }
      .cover-page {
        page: cover-page-layout;
        width: 210mm;
        height: 297mm;
        min-height: 297mm !important;
        padding: 30mm 25mm 30mm 30mm !important;
        margin: 0;
        page-break-after: always;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }
      .toc-page {
        min-height: initial !important;
        padding: 20mm 0 10mm 0 !important;
        page-break-after: always;
      }
    }
  </style>
</head>
<body>
  <div class="word-page">
    {{body}}
  </div>
  <script type="module">
    import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs';
    
    // Find all <pre><code class="language-mermaid"> blocks and convert them to <div class="mermaid">
    const codeBlocks = document.querySelectorAll('pre code.language-mermaid');
    codeBlocks.forEach((codeBlock) => {
      const preBlock = codeBlock.parentNode;
      const mermaidDiv = document.createElement('div');
      mermaidDiv.className = 'mermaid';
      mermaidDiv.textContent = codeBlock.textContent.trim();
      preBlock.parentNode.replaceChild(mermaidDiv, preBlock);
    });

    mermaid.initialize({
      startOnLoad: true,
      theme: 'neutral',
      flowchart: {
        useMaxWidth: true,
        htmlLabels: true
      }
    });
  </script>
</body>
</html>
