<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{title}}</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: "Times New Roman", Times, serif;
      font-size: 14px;
      line-height: 1.5;
      color: #000000;
      background-color: #E2E7EC; /* MS Word workspace canvas background */
      margin: 0;
      padding: 40px 10px;
      display: flex;
      justify-content: center;
    }

    .word-page {
      background-color: #FFFFFF;
      width: 210mm;
      min-height: 297mm;
      padding: 20mm 20mm 20mm 30mm; /* Top Right Bottom Left margins */
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
      position: relative;
    }

    .word-page.landscape {
      width: 297mm;
      min-height: 210mm;
      padding: 20mm;
    }

    h1, h2, h3, h4 {
      margin-top: 18pt;
      margin-bottom: 6pt;
      line-height: 1.3;
      page-break-after: avoid;
    }

    h1 {
      font-size: 20pt;
      color: #1b365d; /* Deep Navy Blue */
      text-align: center;
      text-transform: uppercase;
      margin-bottom: 24pt;
    }

    h2 {
      font-size: 16pt;
      color: #1b365d; /* Deep Navy Blue */
      border-bottom: 2px solid #cbd5e1; /* Elegant light-blue border separator */
      padding-bottom: 4px;
      margin-top: 24pt;
      margin-bottom: 8pt;
    }

    h3 {
      font-size: 14pt;
      color: #2b6cb0; /* Vibrant Steel Blue */
      font-weight: bold;
      margin-top: 18pt;
      margin-bottom: 6pt;
    }

    p {
      margin-top: 0;
      margin-bottom: 0;
      text-indent: 1.27cm; /* Regulatory 0.5 in indentation */
      text-align: justify; /* Justified paragraphs */
      padding-bottom: 8pt;
    }

    ul, ol {
      margin-top: 0;
      margin-bottom: 12pt;
      padding-left: 1.5cm;
    }

    li {
      margin-bottom: 4pt;
      text-align: justify;
    }

    .table-container {
      width: 100%;
      margin: 12pt 0;
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px; /* Slightly smaller table typography */
      margin: 12pt auto;
    }

    th, td {
      border: 1px solid #000000; /* Distinct black grid border */
      padding: 6px 8px;
      vertical-align: top;
    }

    th {
      background-color: #F2F2F2; /* Standard table header color */
      color: #1b365d;
      font-weight: bold;
      text-align: center;
    }

    .caption {
      font-size: 12px;
      font-style: italic;
      text-align: center;
      margin-top: 6pt;
      margin-bottom: 12pt;
      color: #333333;
    }

    .media-container {
      width: 100%;
      margin: 18pt 0;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .media-container img,
    .media-container .chart-mockup {
      max-width: 100%;
      height: auto;
      border: 1px solid #D0D0D0;
      background-color: #FFFFFF;
    }

    pre, code {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
    }

    pre {
      background-color: #f8f9fa;
      border: 1px solid #e9ecef;
      padding: 10px;
      border-radius: 4px;
      overflow-x: auto;
      margin-left: 1.27cm; /* Indent code blocks like paragraphs */
    }

    code {
      background-color: #f8f9fa;
      padding: 2px 4px;
      border-radius: 3px;
      font-size: 0.95em;
    }

    @page {
      size: A4 portrait;
      margin: 20mm 20mm 20mm 30mm;
    }

    @page landscape-page {
      size: A4 landscape;
      margin: 20mm;
    }

    @media print {
      body {
        background-color: #FFFFFF;
        padding: 0;
        margin: 0;
      }
      .word-page {
        width: 100%;
        box-shadow: none;
        padding: 0;
      }
      .word-page.landscape {
        page: landscape-page;
        width: 100%;
        padding: 0;
      }
    }

    @media screen and (max-width: 210mm) {
      body {
        padding: 10px;
        background-color: #FFFFFF;
      }
      .word-page {
        width: 100%;
        padding: 15px;
        box-shadow: none;
      }
      p {
        text-indent: 20px;
      }
    }

    @media screen and (max-width: 297mm) {
      body.has-landscape {
        padding: 10px;
        background-color: #FFFFFF;
      }
      .word-page.landscape {
        width: 100%;
        padding: 15px;
        box-shadow: none;
      }
    }
  </style>
</head>
<body>
  <div class="word-page">
    {{body}}
  </div>
</body>
</html>
