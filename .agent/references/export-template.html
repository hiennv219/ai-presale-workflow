<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{title}}</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; line-height: 1.6; color: #333; max-width: 960px; margin: 0 auto; padding: 2rem; }
    h1 { color: #001f3f; border-bottom: 3px solid #0074D9; padding-bottom: 0.5rem; }
    h2 { color: #001f3f; margin-top: 2rem; border-bottom: 1px solid #ccc; padding-bottom: 0.3rem; }
    h3 { color: #0074D9; }
    table { width: 100%; border-collapse: collapse; margin-bottom: 1.5rem; }
    th { background-color: #001f3f; color: white; text-align: left; padding: 12px; }
    td { border-bottom: 1px solid #ddd; padding: 12px; }
    tr:nth-child(even) { background-color: #f8f9fa; }
    tr:hover { background-color: #e9ecef; }
    ul, ol { margin-bottom: 1.5rem; }
    li { margin-bottom: 0.5rem; }
    pre, code { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; background-color: #f4f4f4; border-radius: 4px; }
    pre { padding: 1rem; overflow-x: auto; border: 1px solid #ddd; }
    @media print {
      body { max-width: 100%; padding: 0; margin: 0; }
      table { page-break-inside: auto; }
      tr { page-break-inside: avoid; page-break-after: auto; }
      thead { display: table-header-group; }
      tfoot { display: table-footer-group; }
    }
  </style>
</head>
<body>
  {{body}}
</body>
</html>
